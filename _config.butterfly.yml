# Butterfly Theme Configuration
# See: https://butterfly.js.org/posts/4aa8abbe/

# Navigation
nav:
  йҰ–йЎө: / || fas fa-home
  еҪ’жЎЈ: /archives/ || fas fa-archive
  ж Үзӯҫ: /tags/ || fas fa-tags
  еҲҶзұ»: /categories/ || fas fa-folder-open
  е…ідәҺ: /about/ || fas fa-heart

# Social Settings
social:
  fab fa-github: https://github.com/lijesom9-create || Github

# Code Blocks
code_blocks:
  theme: mac
  macStyle: true

# Read Mode
readmode: true

# Dark Mode
darkmode:
  enable: true
  button: true

# Avatar
avatar:
  img: /img/avatar.png
  effect: false

# Index
index_img:
  default: 
  random: true

# Cover
cover:
  index_enable: true
  aside_enable: true
  archives_enable: true

# Post Meta
post_meta:
  page:
    date_type: created
    date_format: date
    categories: true
    tags: true
    label: true
  post:
    date_type: both
    date_format: relative
    categories: true
    tags: true
    label: true

# Menu
menu:
  йҰ–йЎө: / || fas fa-home
  еҪ’жЎЈ: /archives/ || fas fa-archive
  ж Үзӯҫ: /tags/ || fas fa-tags
  еҲҶзұ»: /categories/ || fas fa-folder-open

# Social
social_setting:
  follow: false

# Footer
footer:
  owner:
    enable: true
    since: 2026
  custom_text:
  copyright: true

# Sidebar
aside:
  enable: true
  hide: false
  button: true
  mobile: true
  position: right
  display:
    archive: true
    tag: true
    category: true
  card_author:
    enable: true
    description: AIжҠҖжңҜеҚҡе®ўпјҢеҲҶдә«LLM/Agent/RAGе®һжҲҳз»ҸйӘҢ
    button:
      enable: true
      icon: fab fa-github
      text: Follow Me
      link: https://github.com/lijesom9-create
  card_recent_post:
    enable: true
    limit: 5
    sort: date
    sort_order:
  card_categories:
    enable: true
    limit: 8
    expand: none
    sort_order:
  card_tags:
    enable: true
    limit: 40
    color: true
    orderby: random
    order: 1
    sort_order:
  card_archives:
    enable: true
    type: monthly
    format: MMMM YYYY
    order: -1
    limit: 8
    sort_order:

# Comments - Giscus
comments:
  use: Giscus
  text: true
Giscus:
  repo: lijesom9-create/ai-tech-blog
  repo_id: 
  category: Announcements
  category_id: 
  mapping: pathname
  strict: 0
  reactions_enabled: 1
  emit_metadata: 0
  input_position: top
  theme: preferred_color_scheme
  lang: zh-CN

# SEO
SEO:
  title: AI Tech Blog
  description: AIјјКхІ©ҝНЈ¬әӯёЗҙуДЈРНЎўAgentҝтјЬЎўRAGјмЛчФцЗҝЙъіЙөИЗ°СШјјКхҪМіМ
  keywords: AI,LLM,Agent,RAG,LangChain,ҙуДЈРН,ҪМіМ
  author: lijesom9-create

# Article Number
article_number:
  enable: true

# Busuanzi
busuanzi:
  site_uv: true
  site_pv: true
  page_pv: true
